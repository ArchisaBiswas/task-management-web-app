server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # Proxy /api/ calls (MyTasksTable, AllTasksPage) to the backend container.
    # The Vite dev-server handles this at runtime; Nginx handles it in Docker.
    location /api/ {
        proxy_pass         http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback — React Router handles all unmatched paths client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

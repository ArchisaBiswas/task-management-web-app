name: CI Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Node.js
        uses: actions/setup-node@v4  # ✅ updated
        with:
          node-version: 18

      # Debug step (VERY IMPORTANT)
      - name: Show folder structure
        run: ls -R

      # Backend
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Build backend
        working-directory: backend
        run: npm run build || echo "No backend build step"

      # Frontend (adjust path if needed)
      - name: Install frontend dependencies
        working-directory: task-management-web-pages/package
        run: npm install

      - name: Build frontend
        working-directory: task-management-web-pages/package
        run: npm run build

      - name: Done
        run: echo "CI completed successfully 🚀"
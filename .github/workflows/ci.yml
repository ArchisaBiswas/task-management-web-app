name: CI Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 🔍 Debug (optional but useful)
      - name: Show folder structure
        run: ls -R

      # =========================
      # BACKEND
      # =========================
      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Build backend
        working-directory: backend
        run: npm run build || echo "No backend build step"

      - name: Run backend tests
        working-directory: backend
        run: npm test

      # =========================
      # FRONTEND
      # =========================
      - name: Install frontend dependencies
        working-directory: frontend/package
        run: npm install

      - name: Build frontend
        working-directory: frontend/package
        run: npm run build

      - name: Run frontend tests
        working-directory: frontend/package
        run: npm test

      - name: Done
        run: echo "CI completed successfully 🚀"